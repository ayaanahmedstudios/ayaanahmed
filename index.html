<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home / Ayaan Ahmed</title>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #161818;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(20px, 3vw, 32px);
      font-family: 'Bricolage Grotesque', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    #name {
      display: flex;
      align-items: baseline;
      justify-content: center;
    }

    .letter {
      display: inline-block;
      font-size: clamp(52px, 13vw, 164px);
      font-weight: 800;
      color: #e8e4de;
      letter-spacing: -0.03em;
      line-height: 1;
      opacity: 0;
      position: relative;
    }

    .word-gap {
      display: inline-block;
      font-size: clamp(52px, 13vw, 164px);
      width: 0.25em;
    }

    .cta-wrap {
      opacity: 0;
      transform: translateY(12px);
    }

    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      padding: clamp(13px, 2vw, 16px) clamp(24px, 3.5vw, 36px);
      border: 1.5px solid rgba(42,157,143,0.6);
      background: transparent;
      color: rgba(232,228,222,0.65);
      text-decoration: none;
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: clamp(14px, 1.6vw, 16px);
      font-weight: 400;
      letter-spacing: 0.01em;
      border-radius: 100px;
      position: relative;
      overflow: hidden;
      min-height: 50px;
      transition: color 0.4s ease, border-color 0.4s ease, transform 0.3s cubic-bezier(0.16,1,0.3,1), box-shadow 0.4s ease;
    }

    .cta-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: #2a9d8f;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.45s cubic-bezier(0.16,1,0.3,1);
      border-radius: inherit;
    }

    .cta-btn:hover::before { transform: scaleX(1); }
    .cta-btn:hover {
      color: #0a1212;
      border-color: #2a9d8f;
      box-shadow: 0 8px 36px rgba(42,157,143,0.25);
      transform: translateY(-2px);
    }
    .cta-btn:active { transform: translateY(0) scale(0.97); }
    .cta-btn span, .cta-btn svg { position: relative; z-index: 1; }
    .cta-btn svg {
      width: 14px; height: 14px;
      stroke: currentColor;
      flex-shrink: 0;
      transition: transform 0.35s cubic-bezier(0.16,1,0.3,1);
    }
    .cta-btn:hover svg { transform: translate(3px,-3px); }
  </style>
</head>
<body>

<div id="name"></div>

<div class="cta-wrap" id="cta">
  <a class="cta-btn" href="https://ayaanahmed.format.com/home" target="_blank" rel="noopener">
    <span>Visit Portfolio</span>
    <svg viewBox="0 0 14 14" fill="none"><path d="M2 12L12 2M12 2H5.5M12 2V8.5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </a>
</div>

<script>
  const WORDS = ["Ayaan", "Ahmed"];
  const nameEl = document.getElementById('name');
  const letters = [];

  WORDS.forEach((word, wi) => {
    if (wi === 1) {
      const gap = document.createElement('span');
      gap.className = 'word-gap';
      nameEl.appendChild(gap);
    }
    word.split('').forEach(ch => {
      const s = document.createElement('span');
      s.className = 'letter';
      s.textContent = ch;
      nameEl.appendChild(s);
      letters.push(s);
    });
  });

  function easeOutExpo(t) { return t >= 1 ? 1 : 1 - Math.pow(2, -10 * t); }
  function easeOutBack(t) {
    const c1 = 1.70158, c3 = c1 + 1;
    return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
  }
  function lerp(a, b, t) { return a + (b - a) * t; }

  const N = letters.length;
  const maxDist = Math.min(window.innerWidth, window.innerHeight) * 0.7;

  const startStates = letters.map((_, i) => {
    const angle = (i / N) * Math.PI * 2 + (Math.random() - 0.5) * 1.8;
    const dist  = maxDist * (0.6 + Math.random() * 0.4);
    return {
      x:   Math.cos(angle) * dist,
      y:   Math.sin(angle) * dist * 0.55,
      rot: (Math.random() - 0.5) * 320,
    };
  });

  const STAGGER   = 55;
  const ENTRY_DUR = 680;
  const ENTRY_END = (N - 1) * STAGGER + ENTRY_DUR;
  const BTN_START = ENTRY_END + 200;

  let btnShown = false;
  let done = false;
  let t0 = null;

  function tick(ts) {
    if (done) return;
    if (!t0) t0 = ts;
    const el = ts - t0;

    letters.forEach((ltr, i) => {
      const t  = Math.max(0, Math.min(1, (el - i * STAGGER) / ENTRY_DUR));
      const st = startStates[i];
      ltr.style.opacity   = Math.min(1, t * 3.5);
      ltr.style.transform = `translate(${lerp(st.x, 0, easeOutBack(t))}px,${lerp(st.y, 0, easeOutBack(t))}px) rotate(${lerp(st.rot, 0, easeOutExpo(t))}deg)`;
    });

    if (el >= BTN_START && !btnShown) {
      btnShown = true;
      const cta = document.getElementById('cta');
      cta.style.transition = 'opacity 0.8s cubic-bezier(0.16,1,0.3,1), transform 0.8s cubic-bezier(0.16,1,0.3,1)';
      cta.style.opacity = '1';
      cta.style.transform = 'translateY(0)';
    }

    if (el < BTN_START + 900) {
      requestAnimationFrame(tick);
    } else {
      done = true;
      letters.forEach(l => {
        l.style.transform = 'none';
        l.style.opacity   = '1';
      });
    }
  }

  document.fonts.ready.then(() => requestAnimationFrame(tick));
</script>
</body>
</html>
